apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metal-resources
  namespace: kube-system
rules:
  - apiGroups:
      - metal.ironcore.dev
    resources:
      - serverclaims
    verbs:
      - get
      - list
      - watch
      - patch
  - apiGroups:
      - ipam.cluster.x-k8s.io
    resources:
      - ipaddressclaims
    verbs:
      - list
  - apiGroups:
      - ipam.cluster.x-k8s.io
    resources:
      - ipaddresses
    verbs:
      - get
